<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <style>
    :root { --bg:#F4F1EA; --accent:#C4703A; --ink:#2b2b2b; --line:#e3ddd0; }
    * { box-sizing: border-box; }
    body { font-family: -apple-system, "Segoe UI", Roboto, sans-serif; margin:0; padding:12px; color:var(--ink); font-size:13px; }
    h2 { font-size:15px; margin:0 0 10px; }
    .card { background:#fff; border:1px solid var(--line); border-radius:10px; padding:12px; margin-bottom:12px; }
    label { display:block; font-weight:600; margin:8px 0 3px; font-size:12px; }
    input, select, textarea { width:100%; padding:7px; border:1px solid var(--line); border-radius:7px; font-size:13px; font-family:inherit; }
    textarea { resize:vertical; min-height:44px; }
    .row { display:flex; gap:8px; }
    .row > div { flex:1; }
    button { background:var(--accent); color:#fff; border:none; border-radius:8px; padding:9px 12px; font-size:13px; font-weight:600; cursor:pointer; width:100%; margin-top:10px; }
    button.ghost { background:#fff; color:var(--accent); border:1px solid var(--accent); }
    .half { display:flex; gap:8px; }
    .half button { flex:1; }
    .member { border-bottom:1px solid var(--line); padding:8px 0; }
    .member:last-child { border-bottom:none; }
    .mtop { display:flex; justify-content:space-between; font-weight:600; }
    .track { color:var(--accent); font-size:11px; }
    .bar { height:7px; background:var(--line); border-radius:4px; overflow:hidden; margin:5px 0 3px; }
    .fill { height:100%; background:var(--accent); }
    .note { font-size:11px; color:#666; }
    .muted { color:#888; font-size:11px; }
    #msg { font-size:12px; color:var(--accent); min-height:16px; margin-top:6px; }
    a { color:var(--accent); }
  </style>
</head>
<body>
  <h2>🪙 오늘 작업 기록</h2>

  <div class="card">
    <label>팀원</label>
    <select id="member" onchange="syncTrack()"></select>

    <div class="row">
      <div>
        <label>트랙</label>
        <input id="track" placeholder="프론트/백엔드/AI">
      </div>
      <div>
        <label>시간(h)</label>
        <input id="hours" type="number" step="0.5" min="0" placeholder="3">
      </div>
    </div>

    <label>작업 내용</label>
    <input id="task" placeholder="예: 로그인 화면 구현 / 매입 API">

    <label>어디까지 했는지</label>
    <textarea id="progressNote" placeholder="예: UI 뼈대 완료, 유효성 검사 남음"></textarea>

    <label>이 작업 진행률 (%) <span class="muted" id="pv">0%</span></label>
    <input id="percent" type="range" min="0" max="100" step="5" value="0" oninput="document.getElementById('pv').textContent=this.value+'%'">

    <button onclick="submit()">＋ 기록하기</button>
    <div id="msg"></div>
  </div>

  <h2>📊 오늘 팀 현황 <span class="muted" id="today"></span></h2>
  <div class="card" id="dash"><div class="muted">불러오는 중…</div></div>

  <div class="half">
    <button class="ghost" onclick="exportTxt(false)">📄 오늘 txt</button>
    <button class="ghost" onclick="exportTxt(true)">📄 전체 txt</button>
  </div>
  <div id="msg2" style="font-size:12px;margin-top:6px;"></div>

  <script>
    let team = [];

    function init() {
      google.script.run.withSuccessHandler(function (t) {
        team = t;
        const sel = document.getElementById('member');
        sel.innerHTML = t.map(function (m) { return '<option>' + m.name + '</option>'; }).join('');
        syncTrack();
      }).getTeam();
      refresh();
    }

    function syncTrack() {
      const name = document.getElementById('member').value;
      const m = team.find(function (x) { return x.name === name; });
      if (m) document.getElementById('track').value = m.track;
    }

    function submit() {
      const data = {
        member: document.getElementById('member').value,
        track: document.getElementById('track').value,
        task: document.getElementById('task').value,
        progressNote: document.getElementById('progressNote').value,
        hours: document.getElementById('hours').value,
        percent: document.getElementById('percent').value,
      };
      if (!data.task || !data.hours) { document.getElementById('msg').textContent = '작업 내용과 시간을 입력하세요.'; return; }
      document.getElementById('msg').textContent = '저장 중…';
      google.script.run.withSuccessHandler(function (dash) {
        document.getElementById('msg').textContent = '✅ 기록 완료!';
        document.getElementById('task').value = '';
        document.getElementById('progressNote').value = '';
        document.getElementById('hours').value = '';
        render(dash);
      }).withFailureHandler(function (e) {
        document.getElementById('msg').textContent = '⚠ ' + e.message;
      }).logWork(data);
    }

    function refresh() {
      google.script.run.withSuccessHandler(render).getTodayDashboard();
    }

    function render(dash) {
      document.getElementById('today').textContent = dash.date;
      document.getElementById('dash').innerHTML = dash.members.map(function (m) {
        const rate = Math.min(m.rate, 100);
        return '<div class="member">'
          + '<div class="mtop"><span>' + m.name + ' <span class="track">' + m.track + '</span></span>'
          + '<span>' + m.hours + ' / ' + m.quota + 'h</span></div>'
          + '<div class="bar"><div class="fill" style="width:' + rate + '%"></div></div>'
          + '<div class="note">할당 달성 ' + m.rate + '% · 작업 진행률 ' + m.percent + '% · ' + m.tasks + '건</div>'
          + (m.lastNote ? '<div class="note">↳ ' + m.lastNote + '</div>' : '')
          + '</div>';
      }).join('') || '<div class="muted">오늘 기록 없음</div>';
    }

    function exportTxt(all) {
      document.getElementById('msg2').textContent = '내보내는 중…';
      google.script.run.withSuccessHandler(function (r) {
        document.getElementById('msg2').innerHTML = '✅ <a href="' + r.url + '" target="_blank">' + r.name + '</a> 저장됨 (Drive)';
      }).withFailureHandler(function (e) {
        document.getElementById('msg2').textContent = '⚠ ' + e.message;
      }).exportProgressTxt(all);
    }

    init();
  </script>
</body>
</html>
